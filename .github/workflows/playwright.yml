name: Playwright Tests

on:
  # л∞∞нПђ нЫД мЮРлПЩ мЛ§нЦЙ (main лЄМлЮЬмєШмЧР push мЛЬ)
  push:
    branches: [main, master]

  # PR мГЭмД± мЛЬ мЛ§нЦЙ
  pull_request:
    branches: [main, master]

  # мИШлПЩ мЛ§нЦЙ к∞АлК•
  workflow_dispatch:
    inputs:
      suite:
        description: "мЛ§нЦЙнХ† нЕМмК§нКЄ мК§мЬДнКЄ (adminмЭА GitHub Hosted RunnerмЧРмДЬ лѓЄмІАмЫР)"
        type: choice
        options:
          - cmr
          - albumbuddy
          - admin
          - all
        required: true
        default: cmr
      environment:
        description: "мЛ§нЦЙ нЩШк≤љ (CMR suite м†ДмЪ©, лВШл®ЄмІАлКФ prod к≥†м†Х)"
        type: choice
        options:
          - prod
          - stg
        required: false
        default: prod
      project:
        description: "Playwright project override (мШИ: cmr-monitoring)"
        required: false
        default: ""
      spec:
        description: "нКєм†Х мК§нОЩ к≤љл°Ь (мШИ: tests/cmr_monitoring_pom.spec.ts)"
        required: false
        default: ""
      grep:
        description: "мЛ§нЦЙнХ† нЕМмК§нКЄ нМ®нДі (мШИ: TC-HOME, TC-SEARCH)"
        required: false
        default: ""
      retries:
        description: "мЮђмЛЬлПД нЪЯмИШ (0~5, кЄ∞л≥Є 1)"
        type: number
        required: false
        default: 1
      notify_slack:
        description: "Slack мХМл¶Љ м†ДмЖ° мЧђлґА (мК§мЉАм§Д м†ДмЪ©)"
        type: boolean
        required: false
        default: false

# лПЩмЛЬ мЛ§нЦЙ м†ЬнХЬ
# - push/PR: к∞ЩмЭА лЄМлЮЬмєШ лВі мЭім†Д мЛ§нЦЙ мЈ®мЖМ
# - workflow_dispatch(лМАмЛЬл≥ілУЬ нКЄл¶ђк±∞): к∞Бк∞Б лПЕл¶љ мЛ§нЦЙ (нБРмЮЙ)
concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('dispatch-{0}', github.run_id) || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  test:
    name: Playwright Monitoring
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # мЭЄм¶Э м†Хл≥і мД§м†Х (GitHub SecretsмЧРмДЬ м£ЉмЮЕ, мЧЖмЬЉл©і лєИ мГБнГЬ мГЭмД±)
      # STG нЩШк≤љмЧРмДЬлКФ STG_AUTH_JSON secretмЭД мВђмЪ©
      - name: Setup CMR/Admin authentication
        run: |
          ENV_INPUT="${{ github.event.inputs.environment || 'prod' }}"
          if [ "${ENV_INPUT}" = "stg" ] && [ -n "$STG_AUTH_JSON" ]; then
            printf '%s' "$STG_AUTH_JSON" > auth.json
            echo "вЬЕ STG мЭЄм¶Э м†Хл≥і мД§м†Х мЩДл£М"
          elif [ -n "$AUTH_JSON" ]; then
            printf '%s' "$AUTH_JSON" > auth.json
          else
            printf '%s' '{"cookies":[],"origins":[]}' > auth.json
          fi
        env:
          AUTH_JSON: ${{ secrets.AUTH_JSON }}
          STG_AUTH_JSON: ${{ secrets.STG_AUTH_JSON }}

      - name: Setup AlbumBuddy authentication
        run: |
          if [ -n "$AB_AUTH_JSON" ]; then
            printf '%s' "$AB_AUTH_JSON" > ab-auth.json
          else
            printf '%s' '{"cookies":[],"origins":[]}' > ab-auth.json
          fi
        env:
          AB_AUTH_JSON: ${{ secrets.AB_AUTH_JSON }}

      # мЭЄм¶Э нЖ†нБ∞ мЮРлПЩ к∞±мЛ† (лІМл£М/мЮДл∞Х мЛЬ headless Google OAuthл°Ь к∞±мЛ†)
      - name: Auto-refresh auth tokens
        id: auth_refresh
        run: node scripts/ci-refresh-auth.js
        continue-on-error: true
        env:
          ENVIRONMENT_INPUT: ${{ github.event.inputs.environment || 'prod' }}

      # к∞±мЛ† нЫД нЖ†нБ∞ мЬ†нЪ®мД± мµЬмҐЕ к≤Ам¶Э (мЛ§нМ® мЛЬ нЕМмК§нКЄ м§СлЛ® + к∞±мЛ† мХИлВі)
      - name: Validate auth tokens
        id: auth_check
        run: node scripts/validate-auth.js
        env:
          AUTH_WARN_HOURS: "2"

      # нЕМмК§нКЄ мЛ§нЦЙ
      - name: Run Playwright tests
        id: run_playwright
        run: |
          SUITE_INPUT="${{ github.event.inputs.suite || 'cmr' }}"
          PROJECT_INPUT="${{ github.event.inputs.project || '' }}"
          SPEC_INPUT="${{ github.event.inputs.spec || '' }}"
          GREP_INPUT="${{ github.event.inputs.grep || '' }}"
          RETRIES_INPUT="${{ github.event.inputs.retries || '1' }}"
          ENV_INPUT="${{ github.event.inputs.environment || 'prod' }}"

          # нЩШк≤љл≥Д BASE URL л™ЕмЛЬ export вАФ specмЭШ IS_STAGE_ENV к∞АлУЬ(stage/staging лђЄмЮРмЧі нПђнХ®
          # мЧђлґАл°Ь нМРм†Х)к∞А prod мД†нГЭ мЛЬ мШ§мЮСлПЩнХШлКФ к≤ГмЭД л∞©мІАнХШкЄ∞ мЬДнХі prodлПД л™ЕмЛЬм†БмЬЉл°Ь мД§м†Х.
          if [ "${ENV_INPUT}" = "stg" ]; then
            export MAKESTAR_BASE_URL="https://stage-new.makeuni2026.com"
            echo "рЯФІ STG нЩШк≤љ: MAKESTAR_BASE_URL=${MAKESTAR_BASE_URL}"
          elif [ "${ENV_INPUT}" = "prod" ]; then
            export MAKESTAR_BASE_URL="https://www.makestar.com"
            echo "рЯФІ PROD нЩШк≤љ: MAKESTAR_BASE_URL=${MAKESTAR_BASE_URL}"
          fi

          if ! [[ "${RETRIES_INPUT}" =~ ^[0-5]$ ]]; then
            echo "retries мЮЕл†•к∞ТмЭА 0~5 м†ХмИШлІМ нЧИмЪ©лР©лЛИлЛ§: ${RETRIES_INPUT}"
            exit 1
          fi

          has_non_empty_cookies() {
            local file="$1"
            if [ ! -s "$file" ]; then
              return 1
            fi
            if grep -Eq '"cookies"[[:space:]]*:[[:space:]]*\[[[:space:]]*\]' "$file"; then
              return 1
            fi
            return 0
          }

          HAS_AB_AUTH=0
          if has_non_empty_cookies "ab-auth.json"; then
            HAS_AB_AUTH=1
          fi

          CMD=(npx playwright test --config=playwright.ci.config.js "--retries=${RETRIES_INPUT}")
          EFFECTIVE_TARGETS=()
          SKIP_REASONS=()

          add_project() {
            local project="$1"
            CMD+=("--project=${project}")
            EFFECTIVE_TARGETS+=("${project}")
          }

          if [ -n "${SPEC_INPUT}" ]; then
            CMD+=("${SPEC_INPUT}")
          fi

          if [ -n "${PROJECT_INPUT}" ]; then
            if [[ "${PROJECT_INPUT}" == *admin* ]]; then
              echo "::error::admin projectлКФ GitHub Hosted RunnerмЧРмДЬ мЛ§нЦЙнХ† мИШ мЧЖмКµлЛИлЛ§. мВђлВі VPN нЧИмЪ© IPл•Љ к∞АмІД self-hosted runnerмЧРмДЬ мЛ§нЦЙнХім£ЉмДЄмЪФ."
              exit 1
            fi
            if [[ "${PROJECT_INPUT}" == *albumbuddy* ]] && [ "${HAS_AB_AUTH}" -ne 1 ]; then
              echo "::error::AB_AUTH_JSON secretмЭі мЧЖк±∞лВШ лєДмЦі мЮИмЦі albumbuddy projectл•Љ мЛ§нЦЙнХ† мИШ мЧЖмКµлЛИлЛ§."
              exit 1
            fi
            CMD+=("--project=${PROJECT_INPUT}")
            EFFECTIVE_TARGETS+=("${PROJECT_INPUT}")
          else
            case "${SUITE_INPUT}" in
              cmr)
                add_project "cmr-monitoring"
                ;;
              albumbuddy)
                if [ "${HAS_AB_AUTH}" -ne 1 ]; then
                  echo "::error::AB_AUTH_JSON secretмЭі мЧЖк±∞лВШ лєДмЦі мЮИмЦі albumbuddy suiteл•Љ мЛ§нЦЙнХ† мИШ мЧЖмКµлЛИлЛ§."
                  exit 1
                fi
                add_project "albumbuddy-monitoring"
                ;;
              admin)
                echo "::error::admin suiteлКФ GitHub Hosted RunnerмЧРмДЬ Access Denied(VPN/IP allowlist)л°Ь мЛ§нМ®нХ©лЛИлЛ§. self-hosted runnerл°Ь лґДл¶ђ мЛ§нЦЙнХім£ЉмДЄмЪФ."
                exit 1
                ;;
              all)
                add_project "cmr-monitoring"
                if [ "${HAS_AB_AUTH}" -eq 1 ]; then
                  add_project "albumbuddy-monitoring"
                else
                  SKIP_REASONS+=("albumbuddy м†ЬмЩЄ: AB_AUTH_JSON secret мЧЖмЭМ лШРлКФ лєИ мњ†нВ§")
                fi
                SKIP_REASONS+=("admin м†ЬмЩЄ: GitHub Hosted Runner IP лѓЄнЧИмЪ©")
                ;;
              *)
                echo "мІАмЫРнХШмІА мХКлКФ suite мЮЕл†•к∞Т: ${SUITE_INPUT}"
                exit 1
                ;;
            esac
          fi

          if [ "${#EFFECTIVE_TARGETS[@]}" -eq 0 ]; then
            echo "::error::мЛ§нЦЙ к∞АлК•нХЬ лМАмГБ нФДл°Ьм†ЭнКЄк∞А мЧЖмКµлЛИлЛ§."
            exit 1
          fi

          if [ -n "${GREP_INPUT}" ]; then
            CMD+=("-g" "${GREP_INPUT}")
          fi

          PLAYWRIGHT_CMD="${CMD[*]}"
          EFFECTIVE_TARGETS_JOINED="$(IFS=,; echo "${EFFECTIVE_TARGETS[*]}")"
          SKIP_REASONS_JOINED=""
          if [ "${#SKIP_REASONS[@]}" -gt 0 ]; then
            SKIP_REASONS_JOINED="$(printf '%s||' "${SKIP_REASONS[@]}")"
            SKIP_REASONS_JOINED="${SKIP_REASONS_JOINED%||}"
          fi

          echo "playwright_command=${PLAYWRIGHT_CMD}" >> "$GITHUB_OUTPUT"
          echo "suite=${SUITE_INPUT}" >> "$GITHUB_OUTPUT"
          echo "environment=${ENV_INPUT}" >> "$GITHUB_OUTPUT"
          echo "effective_targets=${EFFECTIVE_TARGETS_JOINED}" >> "$GITHUB_OUTPUT"
          echo "skip_reasons=${SKIP_REASONS_JOINED}" >> "$GITHUB_OUTPUT"
          echo "project=${PROJECT_INPUT}" >> "$GITHUB_OUTPUT"
          echo "spec=${SPEC_INPUT}" >> "$GITHUB_OUTPUT"
          echo "grep=${GREP_INPUT}" >> "$GITHUB_OUTPUT"
          echo "retries=${RETRIES_INPUT}" >> "$GITHUB_OUTPUT"

          echo "вЦґ мЛ§нЦЙ л™Ел†є: ${PLAYWRIGHT_CMD}"
          if [ -n "${SKIP_REASONS_JOINED}" ]; then
            echo "вДєпЄП м†ЬмЩЄ нХ≠л™©: ${SKIP_REASONS_JOINED}"
          fi
          "${CMD[@]}"
        env:
          CI: true
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          DASHBOARD_API_SECRET: ${{ secrets.DASHBOARD_API_SECRET }}
          SUITE_INPUT: ${{ github.event.inputs.suite || 'cmr' }}
          ENVIRONMENT_INPUT: ${{ github.event.inputs.environment || 'prod' }}

      - name: Publish run summary
        if: always()
        run: |
          node <<'EOF'
          const fs = require('fs');

          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const outcome = process.env.RUN_OUTCOME || 'unknown';
          const suite = process.env.RUN_SUITE || 'cmr';
          const effectiveTargets = process.env.RUN_EFFECTIVE_TARGETS || '';
          const skipReasonsRaw = process.env.RUN_SKIP_REASONS || '';
          const project = process.env.RUN_PROJECT || '';
          const spec = process.env.RUN_SPEC || '';
          const grep = process.env.RUN_GREP || '';
          const retries = process.env.RUN_RETRIES || '1';
          const environment = process.env.RUN_ENVIRONMENT || 'prod';
          const command = process.env.RUN_COMMAND || '';
          const resultFile = 'test-results/results.json';
          const skipReasons = skipReasonsRaw
            .split('||')
            .map((item) => item.trim())
            .filter(Boolean);

          const outcomeLabelMap = {
            success: 'мД±к≥µ',
            failure: 'мЛ§нМ®',
            cancelled: 'мЈ®мЖМлР®',
            timed_out: 'мЛЬк∞Д міИк≥Љ',
          };
          const outcomeLabel = outcomeLabelMap[outcome] || outcome;

          const lines = [];
          lines.push('## Playwright мЛ§нЦЙ мЪФмХљ');
          lines.push('');
          lines.push('| нХ≠л™© | к∞Т |');
          lines.push('|---|---|');
          lines.push(`| к≤∞к≥Љ | ${outcomeLabel} |`);
          lines.push(`| мЪФм≤≠ suite | ${suite} |`);
          lines.push(`| нЩШк≤љ | ${environment} |`);
          lines.push(`| мЛ§м†Ь мЛ§нЦЙ нФДл°Ьм†ЭнКЄ | ${effectiveTargets || '-'} |`);
          lines.push(`| project override | ${project || '-'} |`);
          lines.push(`| spec | ${spec || '-'} |`);
          lines.push(`| grep | ${grep || '-'} |`);
          lines.push(`| retries | ${retries} |`);
          lines.push(`| command | \`${command || '-'}\` |`);

          if (fs.existsSync(resultFile)) {
            try {
              const raw = fs.readFileSync(resultFile, 'utf-8');
              const data = JSON.parse(raw);
              const stats = data.stats || {};
              const durationMs = typeof stats.duration === 'number' ? stats.duration : null;
              const durationSec = durationMs === null ? '-' : `${Math.round(durationMs / 1000)}s`;

              lines.push('');
              lines.push('### нЕМмК§нКЄ нЖµк≥Д');
              lines.push('');
              lines.push('| metric | value |');
              lines.push('|---|---|');
              lines.push(`| expected | ${stats.expected ?? '-'} |`);
              lines.push(`| unexpected | ${stats.unexpected ?? '-'} |`);
              lines.push(`| flaky | ${stats.flaky ?? '-'} |`);
              lines.push(`| skipped | ${stats.skipped ?? '-'} |`);
              lines.push(`| duration | ${durationSec} |`);

              const failures = [];
              const failedStates = new Set(['failed', 'timedOut', 'interrupted']);
              const walkSuite = (suiteNode) => {
                for (const specNode of suiteNode.specs || []) {
                  for (const testNode of specNode.tests || []) {
                    const hasFailure = (testNode.results || []).some((result) => failedStates.has(result.status));
                    if (!hasFailure) {
                      continue;
                    }
                    const titlePath = [
                      ...(specNode.titlePath || []),
                      ...(testNode.titlePath || []),
                    ].filter(Boolean);
                    failures.push({
                      title: titlePath.join(' > ') || testNode.title || specNode.title || 'Unknown test',
                      file: specNode.file || '-',
                      line: specNode.line || 1,
                    });
                  }
                }
                for (const childSuite of suiteNode.suites || []) {
                  walkSuite(childSuite);
                }
              };

              for (const topSuite of data.suites || []) {
                walkSuite(topSuite);
              }

              const dedupedFailures = [];
              const seen = new Set();
              for (const failure of failures) {
                const key = `${failure.file}:${failure.line}:${failure.title}`;
                if (seen.has(key)) {
                  continue;
                }
                seen.add(key);
                dedupedFailures.push(failure);
              }

              if (dedupedFailures.length > 0) {
                lines.push('');
                lines.push('### м£ЉмЪФ мЛ§нМ® нЕМмК§нКЄ (мµЬлМА 10к∞Ь)');
                for (const failure of dedupedFailures.slice(0, 10)) {
                  lines.push(`- ${failure.title} (\`${failure.file}:${failure.line}\`)`);
                }
              }
            } catch (error) {
              lines.push('');
              lines.push(`- к≤∞к≥Љ JSON нММмЛ± мЛ§нМ®: ${error.message}`);
            }
          } else {
            lines.push('');
            lines.push('- `test-results/results.json` нММмЭЉмЭі мЧЖмЦі нЖµк≥Д нММмЛ±мЭД к±ілДИлЬБлЛИлЛ§.');
          }

          if (skipReasons.length > 0) {
            lines.push('');
            lines.push('### мЛ§нЦЙ м†ЬмЩЄ нХ≠л™©');
            for (const reason of skipReasons) {
              lines.push(`- ${reason}`);
            }
          }

          if (outcome === 'cancelled') {
            lines.push('');
            lines.push('### м∞Єк≥†');
            lines.push('- мЛ§нЦЙмЭі мЈ®мЖМлРШмЧИмКµлЛИлЛ§. (к∞АлК• мЫРмЭЄ: м†ЬнХЬ мЛЬк∞Д міИк≥Љ, мИШлПЩ мЈ®мЖМ, мГИ мЛ§нЦЙмЬЉл°Ь мЭЄнХЬ мЈ®мЖМ)');
          }

          lines.push('');
          lines.push('### к≤∞к≥Љ нЩХмЭЄ мИЬмДЬ');
          lines.push('1. мЬД нЖµк≥ДмЧРмДЬ unexpected/flaky к∞ЬмИШл•Љ нЩХмЭЄнХ©лЛИлЛ§.');
          lines.push('2. мЛ§нМ®к∞А мЮИмЬЉл©і ArtifactsмЭШ `test-results-*`л•Љ лВіл†§л∞ЫмХД `trace.zip`мЭД мЪ∞мД† нЩХмЭЄнХ©лЛИлЛ§.');
          lines.push('3. `playwright-report-*`к∞А мЮИмЬЉл©і `index.html`л°Ь м†Дм≤і л¶ђнПђнКЄл•Љ нЩХмЭЄнХ©лЛИлЛ§.');

          fs.appendFileSync(summaryPath, lines.join('\n') + '\n');
          EOF
        env:
          RUN_OUTCOME: ${{ steps.run_playwright.outcome }}
          RUN_SUITE: ${{ steps.run_playwright.outputs.suite }}
          RUN_ENVIRONMENT: ${{ steps.run_playwright.outputs.environment }}
          RUN_EFFECTIVE_TARGETS: ${{ steps.run_playwright.outputs.effective_targets }}
          RUN_SKIP_REASONS: ${{ steps.run_playwright.outputs.skip_reasons }}
          RUN_PROJECT: ${{ steps.run_playwright.outputs.project }}
          RUN_SPEC: ${{ steps.run_playwright.outputs.spec }}
          RUN_GREP: ${{ steps.run_playwright.outputs.grep }}
          RUN_RETRIES: ${{ steps.run_playwright.outputs.retries }}
          RUN_COMMAND: ${{ steps.run_playwright.outputs.playwright_command }}

      # нЕМмК§нКЄ л¶ђнПђнКЄ мЧЕл°ЬлУЬ (нХ≠мГБ мЛ§нЦЙ)
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ steps.run_playwright.outputs.suite || 'suite' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      # нЕМмК§нКЄ к≤∞к≥Љ (мК§нБђл¶∞мГЈ, нКЄл†ИмЭімК§) мЧЕл°ЬлУЬ
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ steps.run_playwright.outputs.suite || 'suite' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-results/
          retention-days: 7

      # QA лМАмЛЬл≥ілУЬмЧР к≤∞к≥Љ м†ДмЖ°
      - name: Push results to dashboard
        if: always()
        run: |
          if [ ! -f "test-results/results.json" ]; then
            echo "results.json not found, skipping dashboard push"
            exit 0
          fi
          curl -s -X POST "$DASHBOARD_URL/api/results" \
            -H "Authorization: Bearer $DASHBOARD_API_SECRET" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Run-Id: ${{ github.run_id }}" \
            -H "X-GitHub-Suite: ${{ steps.run_playwright.outputs.suite }}" \
            -H "X-GitHub-Environment: ${{ steps.run_playwright.outputs.environment }}" \
            -H "X-GitHub-Sha: ${{ github.sha }}" \
            -H "X-GitHub-Branch: ${{ github.ref_name }}" \
            -H "X-GitHub-Triggered-By: ${{ github.event_name }}" \
            --data-binary @test-results/results.json \
            --max-time 15 || true
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          DASHBOARD_API_SECRET: ${{ secrets.DASHBOARD_API_SECRET }}

      # Slack #team-qa м±ДлДРмЧР к≤∞к≥Љ мХМл¶Љ
      - name: Notify Slack
        if: always() && inputs.notify_slack == true
        run: |
          node <<'SLACK_EOF'
          const fs = require('fs');
          const https = require('https');

          const outcome = process.env.RUN_OUTCOME || 'unknown';
          const suite = process.env.RUN_SUITE || 'cmr';
          const env = process.env.RUN_ENVIRONMENT || 'prod';
          const runUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const triggeredBy = process.env.GITHUB_EVENT_NAME || 'unknown';

          const emojiMap = { success: 'вЬЕ', failure: 'рЯФі', cancelled: 'вЪ†пЄП' };
          const labelMap = { success: 'мД±к≥µ', failure: 'мЛ§нМ®', cancelled: 'мЈ®мЖМ' };
          const emoji = emojiMap[outcome] || 'вЭУ';
          const label = labelMap[outcome] || outcome;

          let statsText = '';
          let failureText = '';

          const resultFile = 'test-results/results.json';
          if (fs.existsSync(resultFile)) {
            try {
              const data = JSON.parse(fs.readFileSync(resultFile, 'utf-8'));
              const s = data.stats || {};
              const dur = typeof s.duration === 'number' ? `${Math.round(s.duration / 1000)}s` : '-';
              statsText = `нЖµк≥Љ: ${s.expected ?? '-'} | мЛ§нМ®: ${s.unexpected ?? 0} | Flaky: ${s.flaky ?? 0} | мК§нВµ: ${s.skipped ?? 0} | мЖМмЪФ: ${dur}`;

              const failures = [];
              const failedStates = new Set(['failed', 'timedOut', 'interrupted']);
              const walk = (node) => {
                for (const spec of node.specs || []) {
                  for (const t of spec.tests || []) {
                    if ((t.results || []).some(r => failedStates.has(r.status))) {
                      const title = [...(spec.titlePath || []), ...(t.titlePath || [])].filter(Boolean).join(' > ') || t.title || spec.title;
                      failures.push(title);
                    }
                  }
                }
                for (const child of node.suites || []) walk(child);
              };
              for (const topSuite of data.suites || []) walk(topSuite);

              const unique = [...new Set(failures)];
              if (unique.length > 0) {
                failureText = '\n\n*мЛ§нМ® нЕМмК§нКЄ:*\n' + unique.slice(0, 5).map(f => `вАҐ ${f}`).join('\n');
                if (unique.length > 5) failureText += `\n  ...мЩЄ ${unique.length - 5}к±і`;
              }
            } catch {}
          }

          const text = `${emoji} *Playwright ${suite.toUpperCase()} (${env})* вАФ ${label}\n${statsText}${failureText}\n\n<${runUrl}|GitHub ActionsмЧРмДЬ л≥ікЄ∞> | нКЄл¶ђк±∞: ${triggeredBy}`;

          const webhookUrl = process.env.SLACK_WEBHOOK_URL;
          if (!webhookUrl) {
            console.log('SLACK_WEBHOOK_URL not set, skipping');
            process.exit(0);
          }

          const url = new URL(webhookUrl);
          const payload = JSON.stringify({ text });
          const req = https.request({
            hostname: url.hostname,
            path: url.pathname,
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) },
          }, (res) => {
            let body = '';
            res.on('data', d => body += d);
            res.on('end', () => console.log(`Slack response: ${res.statusCode} ${body}`));
          });
          req.on('error', (e) => console.log(`Slack request failed: ${e.message}`));
          req.write(payload);
          req.end();
          SLACK_EOF
        env:
          RUN_OUTCOME: ${{ steps.run_playwright.outcome }}
          RUN_SUITE: ${{ steps.run_playwright.outputs.suite }}
          RUN_ENVIRONMENT: ${{ steps.run_playwright.outputs.environment }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
