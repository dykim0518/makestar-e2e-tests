name: Playwright Tests

on:
  # 배포 후 자동 실행 (main 브랜치에 push 시)
  push:
    branches: [main, master]

  # PR 생성 시 실행
  pull_request:
    branches: [main, master]

  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      suite:
        description: '실행할 테스트 스위트 (admin은 GitHub Hosted Runner에서 미지원)'
        type: choice
        options:
          - cmr
          - albumbuddy
          - admin
          - all
        required: true
        default: cmr
      project:
        description: 'Playwright project override (예: cmr-monitoring)'
        required: false
        default: ''
      spec:
        description: '특정 스펙 경로 (예: tests/cmr_monitoring_pom.spec.ts)'
        required: false
        default: ''
      grep:
        description: '실행할 테스트 패턴 (예: TC-HOME, TC-SEARCH)'
        required: false
        default: ''
      retries:
        description: '재시도 횟수 (0~5, 기본 1)'
        type: number
        required: false
        default: 1

# 동시 실행 제한 (이전 실행 취소)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Playwright Monitoring
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # 인증 정보 설정 (GitHub Secrets에서 주입, 없으면 빈 상태 생성)
      - name: Setup CMR/Admin authentication
        run: |
          if [ -n "${{ secrets.AUTH_JSON }}" ]; then
            printf '%s' '${{ secrets.AUTH_JSON }}' > auth.json
          else
            printf '%s' '{"cookies":[],"origins":[]}' > auth.json
          fi

      - name: Setup AlbumBuddy authentication
        run: |
          if [ -n "${{ secrets.AB_AUTH_JSON }}" ]; then
            printf '%s' '${{ secrets.AB_AUTH_JSON }}' > ab-auth.json
          else
            printf '%s' '{"cookies":[],"origins":[]}' > ab-auth.json
          fi

      # 테스트 실행
      - name: Run Playwright tests
        id: run_playwright
        run: |
          SUITE_INPUT="${{ github.event.inputs.suite || 'cmr' }}"
          PROJECT_INPUT="${{ github.event.inputs.project || '' }}"
          SPEC_INPUT="${{ github.event.inputs.spec || '' }}"
          GREP_INPUT="${{ github.event.inputs.grep || '' }}"
          RETRIES_INPUT="${{ github.event.inputs.retries || '1' }}"

          if ! [[ "${RETRIES_INPUT}" =~ ^[0-5]$ ]]; then
            echo "retries 입력값은 0~5 정수만 허용됩니다: ${RETRIES_INPUT}"
            exit 1
          fi

          has_non_empty_cookies() {
            local file="$1"
            if [ ! -s "$file" ]; then
              return 1
            fi
            if grep -Eq '"cookies"[[:space:]]*:[[:space:]]*\[[[:space:]]*\]' "$file"; then
              return 1
            fi
            return 0
          }

          HAS_AB_AUTH=0
          if has_non_empty_cookies "ab-auth.json"; then
            HAS_AB_AUTH=1
          fi

          CMD=(npx playwright test --config=playwright.ci.config.js "--retries=${RETRIES_INPUT}")
          EFFECTIVE_TARGETS=()
          SKIP_REASONS=()

          add_project() {
            local project="$1"
            CMD+=("--project=${project}")
            EFFECTIVE_TARGETS+=("${project}")
          }

          if [ -n "${SPEC_INPUT}" ]; then
            CMD+=("${SPEC_INPUT}")
          fi

          if [ -n "${PROJECT_INPUT}" ]; then
            if [[ "${PROJECT_INPUT}" == *admin* ]]; then
              echo "::error::admin project는 GitHub Hosted Runner에서 실행할 수 없습니다. 사내 VPN 허용 IP를 가진 self-hosted runner에서 실행해주세요."
              exit 1
            fi
            if [[ "${PROJECT_INPUT}" == *albumbuddy* ]] && [ "${HAS_AB_AUTH}" -ne 1 ]; then
              echo "::error::AB_AUTH_JSON secret이 없거나 비어 있어 albumbuddy project를 실행할 수 없습니다."
              exit 1
            fi
            CMD+=("--project=${PROJECT_INPUT}")
            EFFECTIVE_TARGETS+=("${PROJECT_INPUT}")
          else
            case "${SUITE_INPUT}" in
              cmr)
                add_project "cmr-monitoring"
                ;;
              albumbuddy)
                if [ "${HAS_AB_AUTH}" -ne 1 ]; then
                  echo "::error::AB_AUTH_JSON secret이 없거나 비어 있어 albumbuddy suite를 실행할 수 없습니다."
                  exit 1
                fi
                add_project "albumbuddy-monitoring"
                ;;
              admin)
                echo "::error::admin suite는 GitHub Hosted Runner에서 Access Denied(VPN/IP allowlist)로 실패합니다. self-hosted runner로 분리 실행해주세요."
                exit 1
                ;;
              all)
                add_project "cmr-monitoring"
                if [ "${HAS_AB_AUTH}" -eq 1 ]; then
                  add_project "albumbuddy-monitoring"
                else
                  SKIP_REASONS+=("albumbuddy 제외: AB_AUTH_JSON secret 없음 또는 빈 쿠키")
                fi
                SKIP_REASONS+=("admin 제외: GitHub Hosted Runner IP 미허용")
                ;;
              *)
                echo "지원하지 않는 suite 입력값: ${SUITE_INPUT}"
                exit 1
                ;;
            esac
          fi

          if [ "${#EFFECTIVE_TARGETS[@]}" -eq 0 ]; then
            echo "::error::실행 가능한 대상 프로젝트가 없습니다."
            exit 1
          fi

          if [ -n "${GREP_INPUT}" ]; then
            CMD+=("-g" "${GREP_INPUT}")
          fi

          PLAYWRIGHT_CMD="${CMD[*]}"
          EFFECTIVE_TARGETS_JOINED="$(IFS=,; echo "${EFFECTIVE_TARGETS[*]}")"
          SKIP_REASONS_JOINED=""
          if [ "${#SKIP_REASONS[@]}" -gt 0 ]; then
            SKIP_REASONS_JOINED="$(printf '%s||' "${SKIP_REASONS[@]}")"
            SKIP_REASONS_JOINED="${SKIP_REASONS_JOINED%||}"
          fi

          echo "playwright_command=${PLAYWRIGHT_CMD}" >> "$GITHUB_OUTPUT"
          echo "suite=${SUITE_INPUT}" >> "$GITHUB_OUTPUT"
          echo "effective_targets=${EFFECTIVE_TARGETS_JOINED}" >> "$GITHUB_OUTPUT"
          echo "skip_reasons=${SKIP_REASONS_JOINED}" >> "$GITHUB_OUTPUT"
          echo "project=${PROJECT_INPUT}" >> "$GITHUB_OUTPUT"
          echo "spec=${SPEC_INPUT}" >> "$GITHUB_OUTPUT"
          echo "grep=${GREP_INPUT}" >> "$GITHUB_OUTPUT"
          echo "retries=${RETRIES_INPUT}" >> "$GITHUB_OUTPUT"

          echo "▶ 실행 명령: ${PLAYWRIGHT_CMD}"
          if [ -n "${SKIP_REASONS_JOINED}" ]; then
            echo "ℹ️ 제외 항목: ${SKIP_REASONS_JOINED}"
          fi
          "${CMD[@]}"
        env:
          CI: true

      - name: Publish run summary
        if: always()
        run: |
          node <<'EOF'
          const fs = require('fs');

          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const outcome = process.env.RUN_OUTCOME || 'unknown';
          const suite = process.env.RUN_SUITE || 'cmr';
          const effectiveTargets = process.env.RUN_EFFECTIVE_TARGETS || '';
          const skipReasonsRaw = process.env.RUN_SKIP_REASONS || '';
          const project = process.env.RUN_PROJECT || '';
          const spec = process.env.RUN_SPEC || '';
          const grep = process.env.RUN_GREP || '';
          const retries = process.env.RUN_RETRIES || '1';
          const command = process.env.RUN_COMMAND || '';
          const resultFile = 'test-results/results.json';
          const skipReasons = skipReasonsRaw
            .split('||')
            .map((item) => item.trim())
            .filter(Boolean);

          const outcomeLabelMap = {
            success: '성공',
            failure: '실패',
            cancelled: '취소됨',
            timed_out: '시간 초과',
          };
          const outcomeLabel = outcomeLabelMap[outcome] || outcome;

          const lines = [];
          lines.push('## Playwright 실행 요약');
          lines.push('');
          lines.push('| 항목 | 값 |');
          lines.push('|---|---|');
          lines.push(`| 결과 | ${outcomeLabel} |`);
          lines.push(`| 요청 suite | ${suite} |`);
          lines.push(`| 실제 실행 프로젝트 | ${effectiveTargets || '-'} |`);
          lines.push(`| project override | ${project || '-'} |`);
          lines.push(`| spec | ${spec || '-'} |`);
          lines.push(`| grep | ${grep || '-'} |`);
          lines.push(`| retries | ${retries} |`);
          lines.push(`| command | \`${command || '-'}\` |`);

          if (fs.existsSync(resultFile)) {
            try {
              const raw = fs.readFileSync(resultFile, 'utf-8');
              const data = JSON.parse(raw);
              const stats = data.stats || {};
              const durationMs = typeof stats.duration === 'number' ? stats.duration : null;
              const durationSec = durationMs === null ? '-' : `${Math.round(durationMs / 1000)}s`;

              lines.push('');
              lines.push('### 테스트 통계');
              lines.push('');
              lines.push('| metric | value |');
              lines.push('|---|---|');
              lines.push(`| expected | ${stats.expected ?? '-'} |`);
              lines.push(`| unexpected | ${stats.unexpected ?? '-'} |`);
              lines.push(`| flaky | ${stats.flaky ?? '-'} |`);
              lines.push(`| skipped | ${stats.skipped ?? '-'} |`);
              lines.push(`| duration | ${durationSec} |`);

              const failures = [];
              const failedStates = new Set(['failed', 'timedOut', 'interrupted']);
              const walkSuite = (suiteNode) => {
                for (const specNode of suiteNode.specs || []) {
                  for (const testNode of specNode.tests || []) {
                    const hasFailure = (testNode.results || []).some((result) => failedStates.has(result.status));
                    if (!hasFailure) {
                      continue;
                    }
                    const titlePath = [
                      ...(specNode.titlePath || []),
                      ...(testNode.titlePath || []),
                    ].filter(Boolean);
                    failures.push({
                      title: titlePath.join(' > ') || testNode.title || specNode.title || 'Unknown test',
                      file: specNode.file || '-',
                      line: specNode.line || 1,
                    });
                  }
                }
                for (const childSuite of suiteNode.suites || []) {
                  walkSuite(childSuite);
                }
              };

              for (const topSuite of data.suites || []) {
                walkSuite(topSuite);
              }

              const dedupedFailures = [];
              const seen = new Set();
              for (const failure of failures) {
                const key = `${failure.file}:${failure.line}:${failure.title}`;
                if (seen.has(key)) {
                  continue;
                }
                seen.add(key);
                dedupedFailures.push(failure);
              }

              if (dedupedFailures.length > 0) {
                lines.push('');
                lines.push('### 주요 실패 테스트 (최대 10개)');
                for (const failure of dedupedFailures.slice(0, 10)) {
                  lines.push(`- ${failure.title} (\`${failure.file}:${failure.line}\`)`);
                }
              }
            } catch (error) {
              lines.push('');
              lines.push(`- 결과 JSON 파싱 실패: ${error.message}`);
            }
          } else {
            lines.push('');
            lines.push('- `test-results/results.json` 파일이 없어 통계 파싱을 건너뜁니다.');
          }

          if (skipReasons.length > 0) {
            lines.push('');
            lines.push('### 실행 제외 항목');
            for (const reason of skipReasons) {
              lines.push(`- ${reason}`);
            }
          }

          if (outcome === 'cancelled') {
            lines.push('');
            lines.push('### 참고');
            lines.push('- 실행이 취소되었습니다. (가능 원인: 제한 시간 초과, 수동 취소, 새 실행으로 인한 취소)');
          }

          lines.push('');
          lines.push('### 결과 확인 순서');
          lines.push('1. 위 통계에서 unexpected/flaky 개수를 확인합니다.');
          lines.push('2. 실패가 있으면 Artifacts의 `test-results-*`를 내려받아 `trace.zip`을 우선 확인합니다.');
          lines.push('3. `playwright-report-*`가 있으면 `index.html`로 전체 리포트를 확인합니다.');

          fs.appendFileSync(summaryPath, lines.join('\n') + '\n');
          EOF
        env:
          RUN_OUTCOME: ${{ steps.run_playwright.outcome }}
          RUN_SUITE: ${{ steps.run_playwright.outputs.suite }}
          RUN_EFFECTIVE_TARGETS: ${{ steps.run_playwright.outputs.effective_targets }}
          RUN_SKIP_REASONS: ${{ steps.run_playwright.outputs.skip_reasons }}
          RUN_PROJECT: ${{ steps.run_playwright.outputs.project }}
          RUN_SPEC: ${{ steps.run_playwright.outputs.spec }}
          RUN_GREP: ${{ steps.run_playwright.outputs.grep }}
          RUN_RETRIES: ${{ steps.run_playwright.outputs.retries }}
          RUN_COMMAND: ${{ steps.run_playwright.outputs.playwright_command }}

      # 테스트 리포트 업로드 (항상 실행)
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ steps.run_playwright.outputs.suite || 'suite' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      # 테스트 결과 (스크린샷, 트레이스) 업로드
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ steps.run_playwright.outputs.suite || 'suite' }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-results/
          retention-days: 7
