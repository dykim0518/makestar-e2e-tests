name: Scheduled Daily Tests

on:
  schedule:
    # KST 07:00 = UTC 22:00 (전날)
    - cron: "0 22 * * *"

  # 수동 실행도 가능 (테스트용)
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    name: Trigger Daily Test Suites
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CMR (prod)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'playwright.yml',
              ref: 'main',
              inputs: {
                suite: 'cmr',
                environment: 'prod',
                retries: '3',
                notify_slack: 'true',
              },
            });
            console.log('CMR (prod) dispatched');

      - name: Trigger AlbumBuddy (prod)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'playwright.yml',
              ref: 'main',
              inputs: {
                suite: 'albumbuddy',
                environment: 'prod',
                retries: '3',
                notify_slack: 'true',
              },
            });
            console.log('AlbumBuddy (prod) dispatched');
